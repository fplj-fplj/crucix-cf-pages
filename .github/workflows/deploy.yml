name: Deploy to Cloudflare Workers

on:
  # 🔒 默认关闭自动构建，仅支持手动触发
  # 👇 取消下面两行的注释以启用自动构建：
  # push:
  #   branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Configure Cloudflare Credentials
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Update wrangler.toml with KV IDs (if provided)
        run: |
          if [ -n "${{ secrets.KV_BRIEFING_ID }}" ] && [ -n "${{ secrets.KV_CONFIG_ID }}" ]; then
            sed -i "s/PLACEHOLDER_BRIEFING_KV_ID/${{ secrets.KV_BRIEFING_ID }}/g" wrangler.toml
            sed -i "s/PLACEHOLDER_CONFIG_KV_ID/${{ secrets.KV_CONFIG_ID }}/g" wrangler.toml
          fi
          cat wrangler.toml

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: deploy --minify

      - name: Deployment complete
        run: echo "✅ Deployment to Cloudflare Workers successful!"
